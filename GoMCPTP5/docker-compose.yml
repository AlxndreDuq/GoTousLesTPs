services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira
      POSTGRES_DB: mira
    ports:
      - "5432:5432"
    volumes:
      - mira-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mira -d mira"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mira-postgres-data: